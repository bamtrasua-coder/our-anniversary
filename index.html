<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kỷ Niệm 1 Năm - Peter & GiGi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --dark-pink: #f73378;
            --glass: rgba(255, 255, 255, 0.25);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: #ffe4e1;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Hiệu ứng trái tim nền */
        .heart-bg {
            position: absolute;
            top: -10%;
            color: rgba(255, 105, 180, 0.3);
            font-size: 20px;
            user-select: none;
            animation: move linear infinite;
            z-index: 0;
        }

        @keyframes move {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Card chính */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10;
            color: #fff;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .couple-names {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .invitation-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Đồng hồ đếm ngược */
        .countdown {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
        }

        .countdown-item span {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .countdown-item label {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .save-the-date {
            margin-top: 25px;
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: var(--dark-pink);
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .save-the-date:hover {
            transform: scale(1.05);
            background: var(--dark-pink);
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Our 1st Anniversary</h1>
        <div class="couple-names">Peter ❤️ GiGi</div>
        
        <p class="invitation-text">
            "Một năm trước, chúng ta bắt đầu viết nên câu chuyện của mình. <br>
            Và hành trình đó chỉ mới là bắt đầu..."
        </p>

        <p>Trân trọng mời GiGi đến dự buổi tiệc kỷ niệm vào:</p>
        <h3 style="margin-bottom: 5px;">Thứ Hai, 04 tháng 05, 2026</h3>
        
        <div class="countdown" id="timer">
            <div class="countdown-item"><span id="days">00</span><label>Ngày</label></div>
            <div class="countdown-item"><span id="hours">00</span><label>Giờ</label></div>
            <div class="countdown-item"><span id="mins">00</span><label>Phút</label></div>
            <div class="countdown-item"><span id="secs">00</span><label>Giây</label></div>
        </div>

        <a href="#" class="save-the-date">Hẹn gặp em vào ngày đó!</a>
    </div>

    <script>
        // Hiệu ứng trái tim bay
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 200);

        // Đếm ngược đến ngày 04/05/2026
        const targetDate = new Date("May 4, 2026 19:00:00").getTime();

        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = d < 10 ? "0"+d : d;
            document.getElementById("hours").innerHTML = h < 10 ? "0"+h : h;
            document.getElementById("mins").innerHTML = m < 10 ? "0"+m : m;
            document.getElementById("secs").innerHTML = s < 10 ? "0"+s : s;

            if (distance < 0) {
                clearInterval(updateCountdown);
                document.getElementById("timer").innerHTML = "Hôm nay là ngày đặc biệt!";
            }
        }, 1000);
    </script>
</body>
</html>
